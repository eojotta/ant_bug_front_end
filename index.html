<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="./js/app.js" defer></script>
    
    <script type="module" src="./js/dropdown.js" defer></script>
    <title>Planeta Vegano</title>
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header>
        <img src="./img/logo_planetaVerde.png" alt="Planeta Verde com uma planta no meio">
        <nav class="header">
            <img src="./img/Search.svg" alt="Foto de uma lupa">
            <input type="text" placeholder="Pesquise Produtos veganos aqui">
        </nav>
    </header>
    <main id="main">
        <section>
            <ul id="carrossel">

            </ul>
        </section>

        <div class="listaButoes">

            <div class="dropdown">

                <button class="bnt-categoria" id="bnt_alimento">Alimento</button>

                <div id="dropdown_alimento_conteudo" class="dropdown_content">
                   
                </div>
            </div>
            <button class="bnt-categoria" id="bnt_cosmetico">Cosméticos</button>
            <button class="bnt-categoria" id="bnt_vestuario">Vestuário</button>
            <button class="bnt-categoria" id="bnt_acessorio">Acessório</button>
            <button class="bnt-categoria" id="bnt_higienePessoal">Higiene Pessoal</button>
            <button class="bnt-categoria" id="bnt_limpeza">Limpeza</button>
            
        </div>
        
    </main>
    <footer>
        <img class="ant-bug" src="./img/logo_empresa.png" alt="Ant-Bug">

        <small>&copy;2026 - ANT-BUG - Todos os direitos reservados</small>

        <a href="https://github.com">
            <p>Mais informações</p>
            <p class="link-git">
                GitHub
                <img class="git" src="./img/GitHub.svg" alt="Logo do GitHub">
            </p>
        </a>

    </footer>
</body>

</html>
